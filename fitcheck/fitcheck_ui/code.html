<style>
        body {
            background-color: #EAE6FF; /* Primary container as requested */
            overflow-x: hidden;
        }
        .neo-shadow {
            box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        }
        .neo-shadow:active {
            box-shadow: 0px 0px 0px 0px rgba(0,0,0,1);
            transform: translate(4px, 4px);
        }
        /* Custom scrollbar for tags */
        .hide-scroll::-webkit-scrollbar {
            display: none;
        }
        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-body-md text-on-background min-h-screen flex flex-col pb-8">
<!-- TopAppBar -->
<header class="w-full top-0 z-50 flex items-center justify-between px-margin-mobile h-16 bg-background dark:bg-background border-b-[3px] border-on-background shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none transition-all active:translate-x-[4px] active:translate-y-[4px] active:shadow-none hidden md:flex">
<div class="flex items-center gap-2 cursor-pointer">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed">menu</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-black text-on-background uppercase tracking-tighter">FITCHECK!</h1>
<div class="w-10 h-10 bg-secondary-container border-[3px] border-on-background neo-shadow flex items-center justify-center cursor-pointer">
<img alt="User Profile Avatar" class="w-full h-full object-cover" data-alt="A stylized, neo-brutalist avatar of a fashion-forward Gen Z character wearing a bucket hat and oversized sunglasses. Drawn with thick black outlines and vibrant pastel colors on a solid cream background." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDKYB8IeqysZfjQ-mdX7q1CFxD7mg0a5-iSVUxdWiDuoLkrcsAKjg5l68F82MxDqZsbkHdf4LAvaifuXmxknniuPNZYzbsf_C5ohgvCZm9ac3NYeycDnYXDnP0-dT3FlIDfNM091SAu5DOahQbsJkGxC6RPKiTAy3FBud1BzMmeUElLIE_7u7fyh1bwUqEQVAw_s3xnV1Bo0Ju7pEPEACh0MAquFhRQSk5gfwraK8u1pR7ibKYWrHprLOXZLeQ3zcs2xrsU_q0pez2z"/>
</div>
</header>
<!-- Mobile Header (Simplified for Mobile canvas) -->
<header class="md:hidden w-full flex items-center justify-center pt-8 pb-4">
<h1 class="font-headline-xl text-headline-xl font-black text-on-background uppercase tracking-tighter drop-shadow-[4px_4px_0px_rgba(0,0,0,1)] bg-white border-[3px] border-on-background px-6 py-2 rotate-[-2deg]">FITCHECK!</h1>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-start px-margin-mobile pt-8 md:pt-16 pb-8 gap-8 w-full max-w-screen-md mx-auto relative z-10">
<!-- Tagline -->
<div class="bg-tertiary-container border-[3px] border-on-background neo-shadow px-4 py-2 rotate-[1deg] max-w-sm text-center">
<p class="font-label-bold text-label-bold text-on-background uppercase">다른 사람 눈 테러하기 전에 패션 점검부터 하세요.</p>
</div>
<!-- UPLOAD OOTD Button Area -->
<div class="w-full max-w-sm aspect-square bg-white border-[3px] border-on-background neo-shadow flex flex-col items-center justify-center cursor-pointer relative group transition-transform">
<!-- Decorative Sticker -->
<div class="absolute -top-4 -right-4 bg-[#FFEFEA] border-[3px] border-on-background neo-shadow px-3 py-1 rotate-[15deg] z-20">
<span class="font-label-bold text-label-bold">도전!</span>
</div>
<div class="w-24 h-24 rounded-full bg-primary-container border-[3px] border-on-background flex items-center justify-center mb-6 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-[48px] text-on-background" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
</div>
<h2 class="font-headline-lg text-headline-lg font-black text-on-background uppercase text-center mb-2">OOTD<br/>업로드</h2>
<p class="font-body-md text-body-md text-on-surface-variant text-center px-4">탭하여 사진을 찍거나 갤러리에서 선택하세요</p>
</div>
<!-- TPO Selection -->
<div class="w-full mt-4 flex flex-col gap-3">
<h3 class="font-headline-md text-headline-md font-bold uppercase pl-2">상황(TPO) 선택:</h3>
<div class="flex overflow-x-auto hide-scroll gap-4 pb-4 px-2 -mx-2 snap-x">
<button class="snap-start shrink-0 bg-primary-container border-[3px] border-on-background neo-shadow px-6 py-3 min-w-[120px]">
<span class="font-label-bold text-label-bold uppercase">데이트</span>
</button>
<button class="snap-start shrink-0 bg-white border-[3px] border-on-background px-6 py-3 min-w-[120px] hover:bg-surface-variant transition-colors hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-1 active:translate-y-1">
<span class="font-label-bold text-label-bold uppercase">출근</span>
</button>
<button class="snap-start shrink-0 bg-[#FFF9E6] border-[3px] border-on-background px-6 py-3 min-w-[120px] hover:bg-surface-variant transition-colors hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-1 active:translate-y-1">
<span class="font-label-bold text-label-bold uppercase">일상</span>
</button>
<button class="snap-start shrink-0 bg-[#FFEFEA] border-[3px] border-on-background px-6 py-3 min-w-[120px] hover:bg-surface-variant transition-colors hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-1 active:translate-y-1">
<span class="font-label-bold text-label-bold uppercase">운동</span>
</button>
<button class="snap-start shrink-0 bg-white border-[3px] border-on-background px-6 py-3 min-w-[120px] hover:bg-surface-variant transition-colors hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-x-1 active:translate-y-1">
<span class="font-label-bold text-label-bold uppercase">하객</span>
</button>
</div>
<!-- 패션력 측정하기 Button -->
<button class="w-full mt-4 bg-[#FFEFEA] border-[3px] border-on-background neo-shadow px-6 py-4 transform rotate-[1deg] hover:bg-surface-variant active:translate-x-1 active:translate-y-1 active:shadow-none transition-all">
<span class="font-headline-md text-headline-md font-black uppercase">패션력 측정하기</span>
</button>
</div>
</main>
</body></html>
